<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5"
    />

    <title>BloxTailor | 3D Roblox Clothing Editor & Designer Tool</title>
    <meta
      name="description"
      content="Design professional Roblox shirts and pants with BloxTailor. A powerful real-time 3D editor featuring layers, custom brushes, and seamless texture export."
    />
    <meta
      name="keywords"
      content="Roblox, Clothing Editor, Shirt Maker, Roblox Designer, 3D Shirt Template, Roblox Outfit Maker, Blox Tailor"
    />
    <link rel="canonical" href="https://bloxtailor.online/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bloxtailor.online/" />
    <meta
      property="og:title"
      content="BloxTailor - Professional 3D Roblox Clothing Design"
    />
    <meta
      property="og:description"
      content="Create, paint, and export high-quality Roblox clothing in real-time. Free and easy to use."
    />
    <meta
      property="og:image"
      content="https://bloxtailor.online/og-preview.png"
    />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://bloxtailor.online/" />
    <meta property="twitter:title" content="BloxTailor | 3D Roblox Editor" />
    <meta
      property="twitter:description"
      content="The easiest way to design professional Roblox clothes."
    />
    <meta
      property="twitter:image"
      content="https://bloxtailor.online/og-preview.png"
    />

    <link
      rel="icon"
      type="image/png"
      href="%PUBLIC_URL%/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Blox Tailor" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript
      >You need to enable JavaScript to run BloxTailor 3D Editor.</noscript
    >

    <h1 style="display: none">
      BloxTailor - The Ultimate 3D Roblox Clothing Design Tool
    </h1>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js")
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
